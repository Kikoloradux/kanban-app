framework:
    secret: '%env(APP_SECRET)%'


    session:
        cookie_secure: true
        cookie_httponly: true
        cookie_samesite: 'lax'
        gc_maxlifetime: 3600
        handler_id: null

    csrf_protection: true
    form:
        csrf_protection:
            enabled: true
            field_name: _token

    http_method_override: false
    handle_all_throwables: true

    validation:
        email_validation_mode: html5

    php_errors:
        log: true
